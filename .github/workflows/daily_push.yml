name: 汽车座椅产品规划每日推送

on:
  schedule:
    # 每天 8:30 (北京时间 UTC+8 = 0:30 UTC)
    - cron: '30 0 * * *'
  workflow_dispatch:  # 手动触发按钮

jobs:
  daily-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        
        # 方案：从完整requirements.txt中移除无法安装的包
        # 创建清理后的依赖文件
        cat requirements.txt | grep -v -E "^(dbus-python|PyGObject|opencv-python)" > requirements-clean.txt
        
        # 安装所有依赖（允许部分失败）
        pip install -r requirements-clean.txt || true
        
        # 确保核心依赖已安装
        pip install -r requirements-github-actions.txt

    - name: 验证环境变量配置
      env:
        COZE_API_KEY: ${{ secrets.COZE_API_KEY }}
        COZE_WORKLOAD_IDENTITY_API_KEY: ${{ secrets.COZE_WORKLOAD_IDENTITY_API_KEY }}
        COZE_WORKSPACE_ID: ${{ secrets.COZE_WORKSPACE_ID }}
        FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        KNOWLEDGE_TABLE_NAME: ${{ secrets.KNOWLEDGE_TABLE_NAME }}
      run: |
        echo "🔍 验证环境变量配置..."
        
        # 检查必需的 Secrets 是否配置
        errors=0
        
        # 检查 COZE_API_KEY
        if [ -z "$COZE_API_KEY" ]; then
          echo "❌ 错误：COZE_API_KEY 未配置"
          errors=$((errors + 1))
        else
          # 详细诊断 token 格式
          echo ""
          echo "📋 COZE_API_KEY 详细诊断："
          echo "   长度: ${#COZE_API_KEY} 字符"
          echo "   前缀: ${COZE_API_KEY:0:15}..."
          echo "   后缀: ...${COZE_API_KEY: -10}"
          
          # 检查前缀
          if [[ "$COZE_API_KEY" == pat_* ]]; then
            echo "   类型: 个人访问令牌 (pat_)"
            echo "✅ 前缀格式正确"
          elif [[ "$COZE_API_KEY" == sat_* ]]; then
            echo "   类型: 服务访问令牌 (sat_)"
            echo "✅ 前缀格式正确"
          else
            echo "❌ 错误：Token 前缀不正确"
            echo "   期望格式：pat_xxxxx 或 sat_xxxxx"
            errors=$((errors + 1))
          fi
          
          # 检查非法字符
          if echo "$COZE_API_KEY" | grep -q '[[:space:]]'; then
            echo "❌ 错误：Token 包含空白字符（空格、制表符、换行符）"
            errors=$((errors + 1))
          fi
          
          if [[ "$COZE_API_KEY" == \"* ]] || [[ "$COZE_API_KEY" == \'* ]]; then
            echo "❌ 错误：Token 以引号开头"
            errors=$((errors + 1))
          fi
          
          # 检查段数（用于诊断 JWT 格式）
          token_body="${COZE_API_KEY:4}"
          if [[ "$token_body" == *.* ]]; then
            segment_count=$(echo "$token_body" | tr '.' '\n' | wc -l)
            echo "   JWT 段数: $segment_count"
            if [ "$segment_count" -eq 3 ]; then
              echo "   ✅ JWT 格式正确（3段）"
            else
              echo "   ⚠️  JWT 格式段数异常"
            fi
          else
            echo "   格式: 单段（非JWT）"
            echo "   主体长度: ${#token_body} 字符"
          fi
        fi
        
        # 检查其他必需的 Secrets
        for secret_name in COZE_WORKLOAD_IDENTITY_API_KEY COZE_WORKSPACE_ID FEISHU_WEBHOOK_URL KNOWLEDGE_TABLE_NAME; do
          eval "secret_value=\$$secret_name"
          if [ -z "$secret_value" ]; then
            echo "❌ 错误：$secret_name 未配置"
            errors=$((errors + 1))
          else
            echo "✅ $secret_name 已配置"
          fi
        done
        
        # 如果有错误，显示帮助信息并退出
        if [ $errors -gt 0 ]; then
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "⚠️  配置检查失败！发现 $errors 个错误"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "📖 请按照以下步骤配置 GitHub Secrets："
          echo ""
          echo "1. 访问 GitHub 仓库 → Settings → Secrets and variables → Actions"
          echo "2. 点击 'New repository secret' 添加以下 secrets："
          echo ""
          echo "   COZE_API_KEY: pat_xxxxx (从 Coze 平台获取)"
          echo "   COZE_WORKLOAD_IDENTITY_API_KEY: pat_xxxxx (与 COZE_API_KEY 相同)"
          echo "   COZE_WORKSPACE_ID: 12345678 (从 Coze 平台 URL 获取)"
          echo "   FEISHU_WEBHOOK_URL: https://open.feishu.cn/xxx (从飞书群机器人获取)"
          echo "   KNOWLEDGE_TABLE_NAME: Car_Seat_20260330_152242"
          echo ""
          echo "3. 详细说明请查看：QUICKSTART_GITHUB_ACTIONS.md"
          echo ""
          exit 1
        fi
        
        echo ""
        echo "✅ 所有环境变量配置正确！"
        echo ""

    - name: 运行工作流
      env:
        # 用户配置的环境变量（从 Secrets 读取）
        COZE_API_KEY: ${{ secrets.COZE_API_KEY }}
        COZE_WORKLOAD_IDENTITY_API_KEY: ${{ secrets.COZE_WORKLOAD_IDENTITY_API_KEY }}
        COZE_WORKSPACE_ID: ${{ secrets.COZE_WORKSPACE_ID }}
        FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        KNOWLEDGE_TABLE_NAME: ${{ secrets.KNOWLEDGE_TABLE_NAME }}
        
        # Coze 平台固定配置（无需用户配置）
        COZE_WORKSPACE_PATH: ${{ github.workspace }}
        COZE_INTEGRATION_BASE_URL: https://integration.coze.cn
        COZE_INTEGRATION_MODEL_BASE_URL: https://integration.coze.cn/api/v3
        COZE_LOOP_BASE_URL: https://api.coze.cn
        COZE_OUTBOUND_AUTH_ENDPOINT: https://integration.coze.cn/api/v1/secret
        COZE_WORKLOAD_ACCESS_TOKEN_ENDPOINT: https://api.coze.cn/.well-known/token
        COZE_WORKLOAD_IDENTITY_TOKEN_ENDPOINT: https://api.coze.cn/.well-known/token
        
        # 禁用 CozeLoop 追踪（沙箱环境外不可用）
        COZELOOP_DISABLED: "true"
      run: |
        python src/main.py -m flow

    - name: 上传执行日志
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: execution-logs
        path: logs/
        retention-days: 7
