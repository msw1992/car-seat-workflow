name: 汽车座椅产品规划每日推送

on:
  schedule:
    # 每天 8:30 (北京时间 UTC+8 = 0:30 UTC)
    - cron: '30 0 * * *'
  workflow_dispatch:  # 手动触发按钮

jobs:
  daily-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        
        # 方案：从完整requirements.txt中移除无法安装的包
        # 创建清理后的依赖文件
        cat requirements.txt | grep -v -E "^(dbus-python|PyGObject|opencv-python)" > requirements-clean.txt
        
        # 安装所有依赖（允许部分失败）
        pip install -r requirements-clean.txt || true
        
        # 确保核心依赖已安装
        pip install -r requirements-github-actions.txt

    - name: 运行工作流
      env:
        # 用户配置的环境变量（从 Secrets 读取）
        COZE_API_KEY: ${{ secrets.COZE_API_KEY }}
        COZE_WORKLOAD_IDENTITY_API_KEY: ${{ secrets.COZE_WORKLOAD_IDENTITY_API_KEY }}
        COZE_WORKSPACE_ID: ${{ secrets.COZE_WORKSPACE_ID }}
        FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        KNOWLEDGE_TABLE_NAME: ${{ secrets.KNOWLEDGE_TABLE_NAME }}
        
        # Coze 平台固定配置（无需用户配置）
        COZE_INTEGRATION_BASE_URL: https://integration.coze.cn
        COZE_LOOP_BASE_URL: https://api.coze.cn
        COZE_OUTBOUND_AUTH_ENDPOINT: https://integration.coze.cn/api/v1/secret
      run: |
        python src/main.py -m flow

    - name: 上传执行日志
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: execution-logs
        path: logs/
        retention-days: 7
